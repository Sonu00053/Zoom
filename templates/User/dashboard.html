{% extends "User/base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container py-5">

    <!-- Welcome Header -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">Welcome, {{ session['user_name'] }}</h2>
        <a href="/logout" class="btn btn-danger mt-2">Logout</a>
    </div>

    <!-- Cron Status Card -->
    <div class="card text-center shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title">Cron Job Status</h5>
            <p id="cronStatus" class="card-text">Waiting for updates...</p>
        </div>
    </div>

    <!-- Example: Additional Dashboard Cards -->
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6 class="card-title">Users Online</h6>
                    <p class="card-text">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6 class="card-title">Active Tasks</h6>
                    <p class="card-text">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6 class="card-title">Server Load</h6>
                    <p class="card-text">0%</p>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Socket.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
    var socket = io("http://127.0.0.1:5001");

    socket.on("cron_update", function(data){
        console.log(data.msg);
        document.getElementById('cronStatus').innerText = data.msg;
    });
</script>

{% endblock %}
