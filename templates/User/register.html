<!DOCTYPE html>
<html>
<head>
    <title>{{ APP_NAME }}{% if title %} | {{ title }}{% endif %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border: none;
        }
    </style>
</head>


<body class="bg-light">

<div class="container-fluid p-0">
    <div class="row justify-content-center align-items-center min-vh-100 g-0">

        <!-- Mobile full width -->
        <div class="col-12 col-md-8 col-lg-5">

            <div class="card shadow rounded-0 rounded-md-3">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4">
                        {% if title %}{{ title }}{% endif %}
                    </h3>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                          <div class="alert alert-{{ category }} text-center">
                              {{ message|safe }}
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form method="POST" action="/registerPost">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   placeholder="Enter your name"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   placeholder="Enter email"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="number"
                                   name="phone"
                                   class="form-control"
                                   placeholder="Enter phone"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Enter password"
                                   required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                Register
                            </button>
                        </div>

                    </form>

                    <div class="text-center mt-3">
                        Already have an account?
                        <a href="login" class="text-decoration-none">Login</a>
                    </div>

                    <div class="text-center mt-2">
                        <a href="/users" class="btn btn-outline-secondary btn-sm">
                            View Users
                        </a>
                    </div>

                </div>
            </div>

        </div>

    </div>
</div>

</body>
</html>
