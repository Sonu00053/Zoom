services:
  - type: web
    name: zoom-automation
    env: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium

    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PYTHONUNBUFFERED
        value: "1"